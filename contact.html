<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reach out to the corporate offices of Luxwynne Streetwear.">
    <title>Luxwynne | Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>LUX<span>WYNNE</span></h1>
        <p class="tagline">The SC4RY Aesthetic</p>
        <p class="sub-tagline">Communication Hub</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="enquiry.html">Enquiry</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="references.html">References</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Secure Channel Transmission</h2>
            <div class="section-line"></div>
            
            <form id="contactForm">
                <div class="form-group">
                    <label for="contactName">Name / Identification Alias</label>
                    <input type="text" id="contactName" required placeholder="Enter name...">
                </div>

                <div class="form-group">
                    <label for="contactEmail">Digital Correspondence Routing (Email)</label>
                    <input type="email" id="contactEmail" required placeholder="Enter email address...">
                </div>

                <div class="form-group">
                    <label for="contactMessage">Message Core Body</label>
                    <textarea id="contactMessage" rows="6" required placeholder="Write your transmission details here..."></textarea>
                </div>

                <button type="submit">Discharge Transmission</button>
                <div id="responseMessage"></div>
            </form>
        </section>
    </main>

    <script src="js/animations.js"></script>
</body>
</html>
